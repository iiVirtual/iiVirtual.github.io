<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#09090b" />
    <meta name="application-name" content="Hypertrophy" />
    <meta name="apple-mobile-web-app-title" content="Hypertrophy" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Hypertrophy</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" sizes="180x180" />
  </head>
  <body>
    <div id="safe-area-probe" class="safe-area-probe" aria-hidden="true"></div>
    <div id="app"></div>
    <script>
      (function () {
        function syncSafeArea() {
          var p = document.getElementById("safe-area-probe");
          if (!p) return;
          var pb = getComputedStyle(p).paddingBottom;
          if (pb) document.documentElement.style.setProperty("--safe-b", pb);
        }
        function nudgeLayout() {
          var y = window.scrollY || 0;
          window.scrollTo(0, y + 0.001);
          requestAnimationFrame(function () {
            window.scrollTo(0, y);
            syncSafeArea();
          });
        }
        syncSafeArea();
        requestAnimationFrame(syncSafeArea);
        requestAnimationFrame(function () {
          requestAnimationFrame(syncSafeArea);
        });
        if (document.readyState === "complete") nudgeLayout();
        else window.addEventListener("load", nudgeLayout, { once: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", syncSafeArea, { passive: true });
        }
        window.addEventListener("orientationchange", function () {
          requestAnimationFrame(syncSafeArea);
        });
      })();
    </script>
    <script src="./app.js" defer></script>
  </body>
</html>
